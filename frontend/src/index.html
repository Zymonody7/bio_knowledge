<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bio Knowledge Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/index.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-top">
          <p class="eyebrow">Bioinformatics / Protein / Gene / Clinical / AI</p>
          <h1>Bio Knowledge Monitor</h1>
          <p class="sidebar-copy">筛选并定位论文。</p>
        </div>

        <div class="sidebar-controls">
          <input id="search-input" type="search" placeholder="搜索标题、摘要、主题、源、关键词">
          <select id="sort-filter">
            <option value="importance">按综合排序</option>
            <option value="date_desc">按日期最新</option>
            <option value="relevance_desc">按相关度最高</option>
            <option value="novelty_desc">按新颖度最高</option>
            <option value="date_asc">按日期最早</option>
          </select>
          <select id="topic-filter">
            <option value="">全部主题</option>
          </select>
          <select id="source-filter">
            <option value="">全部来源</option>
          </select>
          <select id="category-filter">
            <option value="">全部类别</option>
          </select>
        </div>

        <section class="group-card">
          <div class="section-minihead">
            <h2>快速分类</h2>
          </div>
          <div id="group-list" class="group-list"></div>
        </section>

        <section class="tree-card">
          <div class="section-minihead">
            <h2>导航树</h2>
          </div>
          <div class="tree-block">
            <div class="tree-title">按来源</div>
            <div id="tree-source" class="tree-list"></div>
          </div>
          <div class="tree-block">
            <div class="tree-title">按主题</div>
            <div id="tree-topic" class="tree-list"></div>
          </div>
          <div class="tree-block">
            <div class="tree-title">按年份</div>
            <div id="tree-year" class="tree-list"></div>
          </div>
        </section>

        <section class="paper-list-card">
          <div class="section-minihead">
            <h2>论文列表</h2>
            <span id="paper-count"></span>
          </div>
          <div id="paper-list" class="paper-list"></div>
        </section>
      </aside>

      <main class="detail-pane">
        <section class="overview-card">
          <div class="overview-top">
            <div>
              <p class="eyebrow">Daily Overview</p>
              <h2>今日概览</h2>
            </div>
            <div class="hero-stats" id="hero-stats"></div>
          </div>
          <div id="digest-preview" class="markdown-body overview-digest">加载中...</div>
        </section>

        <section class="detail-card">
          <div class="detail-head">
            <div>
              <p id="detail-meta" class="detail-meta"></p>
              <h2 id="detail-title">请选择左侧论文</h2>
            </div>
            <div class="detail-actions">
              <button id="favorite-toggle" class="secondary-button" type="button">收藏</button>
              <a id="detail-link" class="primary-link" href="#" target="_blank" rel="noreferrer">查看原文</a>
            </div>
          </div>

          <div id="detail-tags" class="detail-tags"></div>

          <div class="detail-grid">
            <div class="metric-card">
              <span>综合</span>
              <strong id="detail-importance">-</strong>
            </div>
            <div class="metric-card">
              <span>相关度</span>
              <strong id="detail-relevance">-</strong>
            </div>
            <div class="metric-card">
              <span>新颖度</span>
              <strong id="detail-novelty">-</strong>
            </div>
            <div class="metric-card">
              <span>已见次数</span>
              <strong id="detail-times-seen">-</strong>
            </div>
          </div>

          <div class="info-blocks">
            <section class="info-card info-card-primary">
              <h3>AI 解读</h3>
              <div id="detail-why" class="markdown-body"></div>
            </section>
            <section class="info-card">
              <h3>中文摘要</h3>
              <div id="detail-abstract-zh" class="markdown-body"></div>
            </section>
            <section class="info-card">
              <h3>原始摘要</h3>
              <div id="detail-abstract" class="markdown-body"></div>
            </section>
          </div>

          <section class="notes-card">
            <div class="section-minihead">
              <h3>研究备注</h3>
              <span id="notes-status"></span>
            </div>
            <textarea id="notes-input" rows="4" placeholder="记录你的判断、关联项目、后续实验想法或和其它论文的关系"></textarea>
          </section>
        </section>

        <section class="chat-card">
          <div class="chat-head">
            <div>
              <h2>问右侧论文 / 问整个知识库</h2>
              <p>默认使用本地混合检索和详细解读。你也可以接入 OpenAI-compatible LLM，让右侧回答变成真正的在线 RAG。</p>
            </div>
          </div>

          <details class="llm-settings">
            <summary>LLM 设置</summary>
            <div class="llm-grid">
              <label>
                <span>模式</span>
                <select id="llm-mode">
                  <option value="local">本地解读</option>
                  <option value="remote">外接 LLM</option>
                </select>
              </label>
              <label>
                <span>Base URL</span>
                <input id="llm-base-url" type="text" placeholder="https://api.openai.com/v1">
              </label>
              <label>
                <span>Model</span>
                <input id="llm-model" type="text" placeholder="gpt-4.1-mini">
              </label>
              <label>
                <span>API Key</span>
                <input id="llm-api-key" type="password" placeholder="只保存在当前浏览器">
              </label>
            </div>
          </details>

          <form id="ask-form" class="ask-form">
            <textarea id="question-input" rows="4" placeholder="例如：这篇工作对临床病原检测 workflow 有什么真实价值？与 gene / protein / llm / agent 的结合点在哪里？"></textarea>
            <div class="form-row">
              <button type="submit">生成解读</button>
              <span id="ask-status"></span>
            </div>
          </form>
          <div id="answer-card" class="answer-card hidden">
            <div id="answer-body" class="markdown-body"></div>
          </div>
        </section>
      </main>
    </div>

    <template id="paper-item-template">
      <button class="paper-item" type="button">
        <span class="paper-item-meta"></span>
        <strong class="paper-item-title"></strong>
        <span class="paper-item-tags"></span>
      </button>
    </template>

    <script src="./main.js" type="module"></script>
  </body>
  </html>
