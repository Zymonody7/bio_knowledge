name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RAG_CHAT_PROVIDER: ${{ vars.RAG_CHAT_PROVIDER }}
      RAG_CHAT_BASE_URL: ${{ vars.RAG_CHAT_BASE_URL }}
      RAG_CHAT_MODEL: ${{ vars.RAG_CHAT_MODEL }}
      SITE_LLM_BASE_URL: ${{ vars.SITE_LLM_BASE_URL }}
      SITE_LLM_MODEL: ${{ vars.SITE_LLM_MODEL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -r requirements.txt

      - name: Build site bundle
        run: |
          .venv/bin/python scripts/build_site_bundle.py
          .venv/bin/python scripts/build_frontend.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
