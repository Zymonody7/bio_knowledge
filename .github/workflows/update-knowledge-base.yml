name: Update Knowledge Base

on:
  workflow_dispatch:
  schedule:
    - cron: "10 1 * * *"

concurrency:
  group: update-knowledge-base
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.BLTCY_API_KEY }}
      RAG_CHAT_PROVIDER: ${{ vars.RAG_CHAT_PROVIDER || 'openai_compatible' }}
      RAG_CHAT_BASE_URL: ${{ vars.RAG_CHAT_BASE_URL || 'https://api.bltcy.ai/v1' }}
      RAG_CHAT_MODEL: ${{ vars.RAG_CHAT_MODEL }}
      RAG_EMBEDDING_PROVIDER: ${{ vars.RAG_EMBEDDING_PROVIDER }}
      RAG_EMBEDDING_BASE_URL: ${{ vars.RAG_EMBEDDING_BASE_URL }}
      RAG_EMBEDDING_MODEL: ${{ vars.RAG_EMBEDDING_MODEL }}
      SITE_LLM_BASE_URL: ${{ vars.SITE_LLM_BASE_URL || 'https://api.bltcy.ai/v1' }}
      SITE_LLM_MODEL: ${{ vars.SITE_LLM_MODEL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -r requirements.txt

      - name: Refresh papers and knowledge base
        run: |
          .venv/bin/python scripts/run_pipeline.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git pull --rebase --autostash origin main
          git add data outputs site docs frontend
          if git diff --cached --quiet; then
            echo "No staged changes after rebase"
            exit 0
          fi
          git commit -m "Daily knowledge base refresh"
          git push
